<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Elixir Test</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mind-elixir/dist/style.css">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 16px;
    }

    #map {
      height: 500px;
      width: 100%;
      border: 1px solid #ccc;
      margin-bottom: 16px;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    #jsonArea {
      width: 100%;
      height: 220px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="button-row">
    <button id="exportBtn">JSON表示</button>
    <button id="loadBtn">JSON読込</button>
    <button id="downloadBtn">JSONダウンロード</button>
    <button id="uploadBtn">JSONアップロード</button>
    <button id="clearBtn">テキストクリア</button>
  </div>

  <input id="fileInput" type="file" accept=".json,application/json" style="display:none;">

  <textarea id="jsonArea" placeholder="ここにJSONを表示 / 貼り付け"></textarea>

  <script type="module" src="index.js"></script>
</body>
</html>
